<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWT Auth Demo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') if not local_test else 'index.css' }}">
    <!-- Fallback for direct file opening -->
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="card">
        <div id="authArea">
            <h2 id="formTitle">Welcome Back</h2>
            
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username">
            </div>
            
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <div class="actions">
                <button id="primaryBtn" onclick="handleAuth()">Sign In</button>
                <button class="secondary" id="toggleBtn" onclick="toggleMode()">Need an account? Register</button>
            </div>
        </div>

        <div id="protectedArea">
            <h2>Dashboard</h2>
            <p id="userInfo">Loading user data...</p>
            <div class="token-info" id="tokenDisplay"></div>
            <div class="actions">
                <button class="secondary" onclick="logout()">Sign Out</button>
            </div>
        </div>

        <div id="message"></div>
    </div>

    <script>
        let isLogin = true;
        const tokenKey = 'jwt_access_token';

        // UI Elements
        const authArea = document.getElementById('authArea');
        const protectedArea = document.getElementById('protectedArea');
        const formTitle = document.getElementById('formTitle');
        const primaryBtn = document.getElementById('primaryBtn');
        const toggleBtn = document.getElementById('toggleBtn');
        const messageBox = document.getElementById('message');

        function toggleMode() {
            isLogin = !isLogin;
            formTitle.innerText = isLogin ? 'Welcome Back' : 'Create Account';
            primaryBtn.innerText = isLogin ? 'Sign In' : 'Register';
            toggleBtn.innerText = isLogin ? 'Need an account? Register' : 'Have an account? Sign In';
            messageBox.style.display = 'none';
        }

        function showMessage(text, isError = false) {
            messageBox.innerText = text;
            messageBox.className = isError ? 'error' : 'success';
            messageBox.style.display = 'block';
        }

        async function handleAuth() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const endpoint = isLogin ? '/login' : '/register';

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    if (isLogin) {
                        localStorage.setItem(tokenKey, data.access_token);
                        checkAuth();
                    } else {
                        showMessage("Registration successful! Please login.");
                        toggleMode();
                    }
                } else {
                    showMessage(data.msg || "An error occurred", true);
                }
            } catch (err) {
                showMessage("Server connection failed", true);
            }
        }

        async function checkAuth() {
            const token = localStorage.getItem(tokenKey);
            if (!token) {
                authArea.style.display = 'block';
                protectedArea.style.display = 'none';
                return;
            }

            try {
                const response = await fetch('/protected', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    authArea.style.display = 'none';
                    protectedArea.style.display = 'block';
                    document.getElementById('userInfo').innerHTML = 
                        `Hello, <strong>${data.logged_in_as}</strong>!<br><small>Joined: ${new Date(data.account_created).toLocaleDateString()}</small>`;
                    document.getElementById('tokenDisplay').innerText = `JWT: ${token.substring(0, 50)}...`;
                    messageBox.style.display = 'none';
                } else {
                    logout();
                }
            } catch (err) {
                logout();
            }
        }

        function logout() {
            localStorage.removeItem(tokenKey);
            authArea.style.display = 'block';
            protectedArea.style.display = 'none';
            messageBox.style.display = 'none';
            document.getElementById('password').value = '';
        }

        // Init
        checkAuth();
    </script>
</body>
</html>
